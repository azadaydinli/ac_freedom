<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4DA6FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0066CC;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)"/>
  <!-- AC unit body -->
  <rect x="48" y="72" width="160" height="80" rx="12" ry="12" fill="white" opacity="0.95"/>
  <!-- Vent lines -->
  <line x1="68" y1="120" x2="188" y2="120" stroke="#4DA6FF" stroke-width="3" stroke-linecap="round"/>
  <line x1="68" y1="130" x2="188" y2="130" stroke="#4DA6FF" stroke-width="3" stroke-linecap="round"/>
  <line x1="68" y1="140" x2="188" y2="140" stroke="#4DA6FF" stroke-width="3" stroke-linecap="round"/>
  <!-- Status LED -->
  <circle cx="72" cy="88" r="4" fill="#00CC66"/>
  <!-- Display area -->
  <rect x="100" y="82" width="56" height="20" rx="3" ry="3" fill="#E8F4FF" stroke="#4DA6FF" stroke-width="1"/>
  <text x="128" y="97" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0066CC" text-anchor="middle">24°C</text>
  <!-- Airflow waves -->
  <path d="M80 168 Q100 178 120 168 Q140 158 160 168" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M80 180 Q100 190 120 180 Q140 170 160 180" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <path d="M80 192 Q100 202 120 192 Q140 182 160 192" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <!-- WiFi indicator -->
  <g transform="translate(176, 82)" fill="white" opacity="0.9">
    <path d="M0 12 A6 6 0 0 1 12 12" fill="none" stroke="white" stroke-width="2"/>
    <path d="M-4 8 A10 10 0 0 1 16 8" fill="none" stroke="white" stroke-width="2" opacity="0.7"/>
    <path d="M-8 4 A14 14 0 0 1 20 4" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
    <circle cx="6" cy="14" r="2" fill="white"/>
  </g>
</svg>
